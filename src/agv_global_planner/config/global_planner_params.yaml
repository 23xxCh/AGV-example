# ============================================================
# global_planner_params.yaml - 全局路径规划器参数配置
# ============================================================

astar_planner:
  ros__parameters:
    # 启发函数类型
    # 0 = 曼哈顿距离（4方向移动适用）
    # 1 = 欧几里得距离（连续移动适用）
    # 2 = 对角线距离/Octile（8方向移动适用，推荐用于AGV）
    heuristic_type: 2

    # 是否允许对角线移动
    # true = 8方向移动，路径更短更自然（推荐）
    # false = 4方向移动，路径只有水平/垂直段
    allow_diagonal: true

    # 代价缩放因子
    # 1.0 = 正常代价
    # >1.0 = 放大代价地图影响，路径更远离障碍物（更安全但更长）
    # <1.0 = 缩小代价地图影响，路径更短但更靠近障碍物
    # 仓储场景推荐1.5~2.0（货架密集，需要远离障碍）
    cost_factor: 1.5

    # 致命障碍阈值
    # 代价地图值 >= 此阈值的格子视为不可通行
    # 253 = 内切障碍（AGV底盘中心会碰到）
    # 254 = 外切障碍（AGV外轮廓会碰到，推荐）
    # 255 = 致命障碍（绝对不可通行）
    lethal_cost: 254

    # 代价地图话题名
    # 默认与map_server发布的地图话题一致
    costmap_topic: "/map"
