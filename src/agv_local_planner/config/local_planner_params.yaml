# ============================================================
# local_planner_params.yaml - DWA局部规划器参数配置
# ============================================================

dwa_planner:
  ros__parameters:
    # ---- 坐标系 ----
    base_frame: "base_link"
    map_frame: "map"

    # ---- 控制频率 ----
    control_frequency: 10.0

    # ---- 话题名 ----
    costmap_topic: "/map"
    path_topic: "/planned_path"

    # ---- 速度限制 ----
    max_vel_x: 0.5
    min_vel_x: -0.1
    max_vel_theta: 1.5
    min_vel_theta: -1.5

    # ---- 加速度限制 ----
    acc_lim_x: 1.0
    acc_lim_theta: 2.0

    # ---- 模拟参数 ----
    sim_time: 2.0
    sim_granularity: 0.1

    # ---- 采样数量 ----
    vx_samples: 10
    vtheta_samples: 20

    # ---- 评分权重 ----
    path_distance_bias: 0.6
    goal_distance_bias: 0.8
    occdist_scale: 0.8

    # ---- 目标到达判定 ----
    goal_tolerance_xy: 0.15
    goal_tolerance_yaw: 0.2
