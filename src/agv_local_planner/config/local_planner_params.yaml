# ============================================================
# local_planner_params.yaml - DWA局部规划器参数配置
# ============================================================
#
# 【调参指南】
# 这些参数控制DWA避障行为，建议按以下顺序调整：
# 1. 先调速度限制（max_vel_x, max_vel_theta）
# 2. 再调加速度限制（acc_lim_x, acc_lim_theta）
# 3. 最后调评分权重（path/goal/occ）
#
# 【常见问题排查】
# - AGV不动？检查max_vel_x是否>0，costmap是否收到
# - AGV撞障碍物？增大occdist_scale，减小max_vel_x
# - AGV原地打转？减小goal_distance_bias，增大path_distance_bias
# - AGV走得太慢？增大max_vel_x，减小occdist_scale
# - AGV路径抖动？增大sim_time，减小control_frequency

dwa_planner:
  ros__parameters:
    # ---- 坐标系 ----
    base_frame: "base_link"    # 机器人本体坐标系
    map_frame: "map"           # 地图坐标系

    # ---- 控制频率 ----
    # DWA计算和发布cmd_vel的频率（Hz）
    # 典型值：5~20 Hz
    # 太低：反应迟钝，可能撞到突然出现的障碍物
    # 太高：CPU占用大，对实时性要求高
    control_frequency: 10.0

    # ---- 话题名 ----
    costmap_topic: "/map"            # 代价地图话题
    path_topic: "/planned_path"      # 全局路径话题

    # ---- 速度限制 ----
    # 这些参数必须匹配你的AGV硬件能力！
    max_vel_x: 0.5         # 最大前进速度（m/s）
                            # 仓储AGV典型值：0.3~1.0
                            # 值越大，AGV跑得越快，但避障反应时间越短
    min_vel_x: -0.1        # 最大后退速度（m/s，负值）
                            # -0.1表示可以缓慢后退
                            # 0.0表示禁止后退
    max_vel_theta: 1.5      # 最大角速度（rad/s）
                            # 仓储AGV典型值：0.5~2.0
                            # 值越大，转弯越灵活
    min_vel_theta: -1.5     # 最小角速度（rad/s，负值=顺时针）

    # ---- 加速度限制 ----
    # 加速度限制决定了速度变化的快慢
    # 必须匹配AGV的电机和驱动器能力！
    acc_lim_x: 1.0          # 最大线加速度（m/s²）
                            # 太大：加速太猛，货物可能倾倒
                            # 太小：加速太慢，效率低
    acc_lim_theta: 2.0      # 最大角加速度（rad/s²）
                            # 太大：转向太猛，可能侧翻
                            # 太小：转向太慢，避障反应迟钝

    # ---- 模拟参数 ----
    # DWA在速度空间采样，模拟每种速度的轨迹
    sim_time: 2.0           # 前向模拟时长（秒）
                            # 太短：看不到远处的障碍物
                            # 太长：计算量大，反应变慢
                            # 建议：1.5~3.0秒
    sim_granularity: 0.1    # 模拟时间步长（秒）
                            # 越小越精确，但计算量越大
                            # 建议：0.05~0.2秒

    # ---- 采样数量 ----
    # 采样越多，找到的最优解越好，但计算量越大
    vx_samples: 10          # 线速度采样数
                            # 建议：5~20
    vtheta_samples: 20      # 角速度采样数
                            # 建议：10~40
                            # 总评估轨迹数 = 10 * 20 = 200

    # ---- 评分权重 ----
    # 这三个权重控制AGV的行为倾向
    # G = α * path + β * goal + γ * obstacle
    #
    # 调参口诀：
    # α大 → 贴路径走
    # β大 → 冲目标去
    # γ大 → 躲障碍物

    path_distance_bias: 0.6  # α：路径跟踪权重
                              # 越大，AGV越紧贴全局路径
                              # 太大：AGV像"钉"在路径上，不灵活
                              # 太小：AGV偏离路径，可能迷路
                              # 建议：0.3~1.0

    goal_distance_bias: 0.8  # β：目标朝向权重
                              # 越大，AGV越朝向局部目标走
                              # 太大：AGV直冲目标，忽略路径
                              # 太小：AGV不积极向目标移动
                              # 建议：0.5~1.5

    occdist_scale: 0.8       # γ：避障权重
                              # 越大，AGV越远离障碍物
                              # 太大：AGV过度保守，离障碍物很远
                              # 太小：AGV冒险，可能擦到障碍物
                              # 建议：0.1~1.0
                              # 仓储场景建议稍大（0.5+），货架密集

    # ---- 目标到达判定 ----
    goal_tolerance_xy: 0.15  # 位置容差（米）
                              # 机器人与目标距离 < 此值 = 到达
                              # 太大：定位粗糙
                              # 太小：可能永远到不了（振荡）
    goal_tolerance_yaw: 0.2  # 角度容差（弧度）
                              # 约11度
