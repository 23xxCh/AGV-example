# ============================================================
# nav2_params.yaml - Nav2集成配置
# ============================================================
#
# 【说明】
# 此配置文件展示如何将自定义A*规划器和DWA避障器集成到Nav2框架。
# Nav2使用生命周期管理器(lifecycle_manager)统一管理各节点的启动和关闭。
#
# 【架构】
#   Nav2 BT Navigator
#       ↓ (行为树调用)
#   Nav2 Controller Server ← 使用我们的DWA避障器
#   Nav2 Planner Server    ← 使用我们的A*规划器
#       ↓
#   Nav2 Costmap Server    ← 提供代价地图
#       ↓
#   自定义节点 (A*/DWA)

# ============================================================
# 全局代价地图
# ============================================================
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      width: 5
      height: 5
      resolution: 0.05
      rolling_window: false
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.3
        cost_scaling_factor: 3.0

# ============================================================
# 局部代价地图
# ============================================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      width: 3
      height: 3
      resolution: 0.05
      rolling_window: true
      plugins: ["inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.2
        cost_scaling_factor: 3.0

# ============================================================
# 全局规划器服务器（使用自定义A*规划器）
# ============================================================
planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["AStarPlanner"]
    AStarPlanner:
      plugin: "agv_global_planner/AstarPlanner"

# ============================================================
# 局部控制器服务器（使用自定义DWA避障器）
# ============================================================
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_plugins: ["DWAController"]
    DWAController:
      plugin: "agv_local_planner/DWAPlanner"

# ============================================================
# 行为树导航器
# ============================================================
bt_navigator:
  ros__parameters:
    use_sim_time: true
    default_bt_xml_filename: "navigate_w_replanning_and_recovery.xml"

# ============================================================
# 行为服务器（恢复行为）
# ============================================================
behavior_server:
  ros__parameters:
    use_sim_time: true
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"

# ============================================================
# 路点跟随器
# ============================================================
waypoint_follower:
  ros__parameters:
    use_sim_time: true
