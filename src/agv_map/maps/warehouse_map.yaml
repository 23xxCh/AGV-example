# ============================================================
# warehouse_map.yaml - 仓储测试地图配置文件
# ============================================================
#
# 【YAML地图配置说明】
# 这是ROS2地图服务器的标准配置格式
# 每个字段控制地图加载和解析的不同方面

# image: PGM图像文件的路径（相对于本YAML文件）
# 该PGM文件包含了仓库的平面图
image: warehouse_test.pgm

# resolution: 地图分辨率（米/像素）
# 0.05 = 每个格子5cm×5cm
# 常见选择：
#   0.02 = 2cm/像素（精细，内存占用大）
#   0.05 = 5cm/像素（推荐，平衡精度和内存）
#   0.10 = 10cm/像素（粗糙，内存占用小）
resolution: 0.05

# origin: 地图左下角在世界坐标系中的位置 [x, y, yaw]
# x, y: 米为单位
# yaw: 弧度为单位（通常为0，表示地图与世界坐标对齐）
# 例如 [5.0, 5.0, 0.0] 表示地图左下角在世界坐标(5.0, 5.0)处
origin: [0.0, 0.0, 0.0]

# negate: 是否反转像素值含义
# 0 = 不反转（黑=自由，白=障碍，ROS标准）
# 1 = 反转（白=自由，黑=障碍）
# 大多数地图工具输出的PGM遵循ROS标准，设为0即可
negate: 0

# occupied_thresh: 障碍物阈值
# 像素归一化值(pix/255) > 此值 → 视为障碍物
# 0.65 表示像素值 > 165 → 障碍物
# 降低此值 = 更多区域被判定为障碍物（更保守）
occupied_thresh: 0.65

# free_thresh: 自由区域阈值
# 像素归一化值(pix/255) < 此值 → 视为自由区域
# 0.196 表示像素值 < 50 → 自由区域
# 提高此值 = 更少区域被判定为自由（更保守）
free_thresh: 0.196
