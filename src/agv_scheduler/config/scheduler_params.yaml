# ============================================================
# 多AGV调度系统参数配置
# ============================================================

# --- 交通管理器参数 ---
traffic_manager:
  ros__parameters:
    # 地图分辨率（米/格），需与实际地图一致
    resolution: 0.05
    # 地图原点坐标
    origin_x: 0.0
    origin_y: 0.0
    # 安全距离（格子数），AGV周围预约的额外格子
    # 值越大车距越大，建议2~4
    safety_distance: 2
    # 预约超时时间（秒），超过此时间的预约自动清理
    reservation_timeout: 60.0

# --- 任务调度器参数 ---
task_scheduler:
  ros__parameters:
    # AGV编号列表，需与实际AGV节点的命名空间一致
    agv_ids:
      - "agv_001"
      - "agv_002"
    # 任务分配检查间隔（秒）
    assignment_interval: 1.0
    # 任务默认超时时间（秒）
    task_timeout: 300.0
    # 优先级老化速率（每秒增加的优先级值）
    # 低优先级任务等待越久，有效优先级越高，防止饥饿
    aging_rate: 0.1
    # 最大老化加成（防止老化超过原始优先级差距）
    max_aging_bonus: 5.0
    # 是否启用任务抢占（高优先级任务可抢占低优先级任务的AGV）
    enable_preemption: true
    # 抢占阈值：新任务优先级 - 当前任务优先级 >= 此值才触发抢占
    preemption_threshold: 3
